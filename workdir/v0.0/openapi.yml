              $ref: '#/components/links/GetCreatedVisit'
            UpdateCreatedVisit:
              $ref: '#/components/links/UpdateCreatedVisit'
            GetPetFromVisit:
              $ref: '#/components/links/GetPetFromVisit'
            ListVisitsAfterCreateVisit:
              $ref: '#/components/links/ListVisitsAfterCreateVisit'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        404:
          description: Pet not found for this owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /pettypes:
