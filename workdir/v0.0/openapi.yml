          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
      requestBody:
        description: The details of the new pet.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetFields'
            examples:
              validPet:
                $ref: '#/components/examples/PetCreateExample'
        required: true
      responses:
        201:
          description: The pet was successfully added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
              examples:
                createdPet:
                  $ref: '#/components/examples/PetResponseExample'
          links:
            GetCreatedOwnersPet:
              $ref: '#/components/links/GetCreatedOwnersPet'
            GetCreatedPet:
              $ref: '#/components/links/GetCreatedPet'
            GetOwnerOfCreatedPet:
              $ref: '#/components/links/GetOwnerFromPet'
            UpdateCreatedOwnersPet:
              $ref: '#/components/links/UpdateCreatedOwnersPet'
            AddVisitToCreatedOwnersPet:
              $ref: '#/components/links/AddVisitToCreatedOwnersPet'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        404:
          description: Pet or Owner not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /owners/{ownerId}/pets/{petId}:
    get:
      tags:
        - pet
      operationId: getOwnersPet
      summary: Get a pet by ID
      description: Returns the pet or a 404 error.
      parameters:
        - name: ownerId
          in: path
          description: The ID of the pet owner.
          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
        - name: petId
          in: path
          description: The ID of the pet.
          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
      responses:
        200:
          description: Pet details found and returned.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            application/json:
              schema:
