          description: Pet updated; returns the persisted pet (enables stateful links that read id from the body).
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
          links:
            DeletePetAfterUpdate:
              $ref: '#/components/links/DeletePetAfterUpdate'
        304:
          description: Not modified.
          headers:
            ETag:
