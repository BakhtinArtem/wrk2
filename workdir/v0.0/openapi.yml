components:
  examples:
    OwnerCreateExample:
      summary: Typical owner payload
      value:
        firstName: George
        lastName: Franklin
        address: 110 W. Liberty St.
        city: Madison
        telephone: "6085551023"
    OwnerResponseExample:
      summary: Owner with nested pet data
      value:
        id: 1
        firstName: George
        lastName: Franklin
        address: 110 W. Liberty St.
        city: Madison
        telephone: "6085551023"
        pets:
          - id: 1
            name: Leo
            birthDate: "2010-09-07"
            ownerId: 1
            type:
              id: 1
              name: cat
            visits:
              - id: 1
                date: "2024-05-10"
                description: annual vaccination
                petId: 1
    PetCreateExample:
      summary: Typical pet payload
      value:
        name: Leo
        birthDate: "2010-09-07"
        type:
          id: 1
          name: cat
    PetResponseExample:
      summary: Persisted pet payload
      value:
        id: 1
        name: Leo
        birthDate: "2010-09-07"
        ownerId: 1
        type:
          id: 1
          name: cat
        visits:
          - id: 1
            date: "2024-05-10"
            description: annual vaccination
            petId: 1
    VisitCreateExample:
      summary: Typical visit payload
      value:
        date: "2024-05-10"
        description: annual vaccination
    VisitResponseExample:
      summary: Persisted visit payload
      value:
        id: 1
        date: "2024-05-10"
        description: annual vaccination
        petId: 1
    UserCreateExample:
      summary: Typical user payload
      value:
        username: john.doe
        password: "P@ssw0rd1"
        enabled: true
        roles:
          - name: ROLE_OWNER_ADMIN
  links:
    GetOwnerFromOwnersList:
      operationId: getOwner
      parameters:
        ownerId: '$response.body#/0/id'
      description: Follow the first owner from the owners list response.
    ListPetsAfterOwnersList:
      operationId: listPets
      description: List all pets after listing owners.
    GetPetFromOwnersList:
      operationId: getPet
      parameters:
        petId: '$response.body#/0/pets/0/id'
      description: Follow the first pet of the first owner in the list response.
    ListVetsAfterOwnersList:
      operationId: listVets
      description: List all vets after listing owners.
    GetVetFromVetsList:
      operationId: getVet
      parameters:
        vetId: '$response.body#/0/id'
      description: Follow the first vet in the list response.
    GetSpecialtyFromSpecialtiesList:
      operationId: getSpecialty
      parameters:
        specialtyId: '$response.body#/0/id'
      description: Follow the first specialty in the list response.
    GetPetFromPetsList:
      operationId: getPet
      parameters:
        petId: '$response.body#/0/id'
      description: Follow the first pet in the listPets response.
    UpdatePetFromPetsList:
      operationId: updatePet
      parameters:
        petId: '$response.body#/0/id'
