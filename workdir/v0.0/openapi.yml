openapi: 3.0.1
info:
  title: Spring PetClinic
  description: Spring PetClinic Sample Application.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: '1.0'
servers:
  - url: http://localhost:9966/petclinic/api
tags:
  - name: failing
    description: Endpoint which always returns an error.
  - name: owner
    description: Endpoints related to pet owners.
  - name: user
    description: Endpoints related to users.
  - name: pet
    description: Endpoints related to pets.
  - name: vet
    description: Endpoints related to vets.
  - name: visit
    description: Endpoints related to vet visits.
  - name: pettypes
    description: Endpoints related to pet types.
  - name: specialty
    description: Endpoints related to vet specialties.
paths:
  /oops:
    get:
      tags:
        - failing
      operationId: failingRequest
      summary: Failure-sample route
      description: >
        Stable GET route for benchmarks and OpenAPI links. Returns 200 text/plain so callers can
        complete stateful chains; use other operations to exercise real error responses.
      responses:
        200:
          description: Plain text confirmation that the failure-sample path was hit.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            text/plain:
              schema:
                type: string
        304:
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /owners:
    post:
      tags:
        - owner
      operationId: addOwner
      summary: Adds a pet owner
      description: Records the details of a new pet owner.
      requestBody:
        description: The pet owner
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerFields'
            examples:
              validOwner:
                $ref: '#/components/examples/OwnerCreateExample'
        required: true
      responses:
        201:
          description: The pet owner was successfully added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
              examples:
                createdOwner:
                  $ref: '#/components/examples/OwnerResponseExample'
          links:
            GetCreatedOwner:
              $ref: '#/components/links/GetCreatedOwner'
            ListOwnersByLastName:
              $ref: '#/components/links/ListOwnersByLastName'
            UpdateCreatedOwner:
              $ref: '#/components/links/UpdateOwnerFromOwner'
            AddPetToCreatedOwner:
              $ref: '#/components/links/AddPetToOwnerFromOwner'
            DeleteCreatedOwner:
              $ref: '#/components/links/DeleteOwnerFromOwner'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    get:
      tags:
        - owner
      operationId: listOwners
      summary: Lists pet owners
      description: Returns an array of pet owners.
      parameters:
        - name: lastName
          in: query
          description: Last name prefix filter (server uses prefix match). Values below match default sample data; omit the parameter to list all owners.
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 30
            pattern: "^[A-Za-z]+([ '-][A-Za-z]+){0,2}\\.?$"
            example: Davis
            enum:
              - Davis
              - Franklin
              - Rodriquez
              - McTavish
              - Coleman
              - Black
              - Escobito
              - Schroeder
              - Estaban
          examples:
            davis:
              value: Davis
            franklin:
              value: Franklin
      responses:
        200:
          description: Owner details found and returned.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Owner'
          links:
            GetOwnerFromOwnersList:
              $ref: '#/components/links/GetOwnerFromOwnersList'
            ListPetsAfterOwnersList:
              $ref: '#/components/links/ListPetsAfterOwnersList'
            GetPetFromOwnersList:
              $ref: '#/components/links/GetPetFromOwnersList'
            ListVetsAfterOwnersList:
              $ref: '#/components/links/ListVetsAfterOwnersList'
            GetVetFromOwnersList:
              $ref: '#/components/links/GetVetFromOwnersList'
            ListPetTypesAfterOwnersList:
              $ref: '#/components/links/ListPetTypesAfterOwnersList'
            ListVisitsAfterOwnersList:
              $ref: '#/components/links/ListVisitsAfterOwnersList'
        304:
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /owners/{ownerId}:
    get:
      tags:
        - owner
      operationId: getOwner
      summary: Get a pet owner by ID
      description: Returns the pet owner or a 404 error.
      parameters:
        - name: ownerId
          in: path
          description: The ID of the pet owner.
          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
      responses:
        200:
          description: Owner details found and returned.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
              examples:
                ownerWithPets:
                  $ref: '#/components/examples/OwnerResponseExample'
          links:
            ListOwnersByLastName:
              $ref: '#/components/links/ListOwnersByLastName'
            UpdateThisOwner:
              $ref: '#/components/links/UpdateOwnerFromOwner'
            AddPetToThisOwner:
              $ref: '#/components/links/AddPetToOwnerFromOwner'
        304:
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        404:
          description: Owner not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    put:
      tags:
        - owner
      operationId: updateOwner
      summary: Update a pet owner's details
      description: Updates the pet owner record with the specified details.
      parameters:
        - name: ownerId
          in: path
          description: The ID of the pet owner.
          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
      requestBody:
        description: The pet owner details to use for the update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerFields'
        required: true
      responses:
        200:
          description: Update successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
          links:
            GetUpdatedOwner:
              $ref: '#/components/links/GetUpdatedOwner'
            ListOwnersByUpdatedLastName:
              $ref: '#/components/links/ListOwnersByUpdatedLastName'
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        404:
          description: Owner not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      tags:
        - owner
      operationId: deleteOwner
      summary: Delete an owner by ID
      description: Returns the owner or a 404 error.
      parameters:
        - name: ownerId
          in: path
          description: The ID of the owner.
          required: true
          schema:
            type: integer
            format: int32
            minimum: 0
            example: 1
      responses:
        200:
          description: Owner details found and returned.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        304:
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              schema:
                type: string
        400:
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        404:
          description: Owner  not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        500:
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
  /owners/{ownerId}/pets:
    post:
      tags:
        - pet
      operationId: addPetToOwner
      summary: Adds a pet to an owner
      description: Records the details of a new pet.
      parameters:
        - name: ownerId
          in: path
